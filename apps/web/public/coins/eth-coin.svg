<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">Rotating Ethereum coin</title>
  <desc id="desc">A polished silver and violet coin with the Ethereum symbol, animated in 3D.</desc>
  <defs>
    <radialGradient id="face" cx="34%" cy="23%" r="78%"><stop stop-color="#fff"/><stop offset=".22" stop-color="#dcdfff"/><stop offset=".55" stop-color="#8b8ed1"/><stop offset=".82" stop-color="#4b4f91"/><stop offset="1" stop-color="#22264f"/></radialGradient>
    <linearGradient id="rim" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#fff"/><stop offset=".2" stop-color="#aeb2e8"/><stop offset=".48" stop-color="#373b74"/><stop offset=".73" stop-color="#e1e3ff"/><stop offset="1" stop-color="#24274d"/></linearGradient>
    <linearGradient id="ethTop" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#f5f1ff"/><stop offset=".5" stop-color="#a9a3ff"/><stop offset="1" stop-color="#4f46a7"/></linearGradient>
    <linearGradient id="ethSide" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#7772d8"/><stop offset="1" stop-color="#25245e"/></linearGradient>
    <linearGradient id="shine"><stop stop-color="#fff" stop-opacity=".9"/><stop offset=".4" stop-color="#fff" stop-opacity=".1"/><stop offset="1" stop-color="#fff" stop-opacity="0"/></linearGradient>
    <filter id="shadow" x="-35%" y="-35%" width="170%" height="180%"><feDropShadow dx="0" dy="24" stdDeviation="18" flood-color="#14152f" flood-opacity=".5"/></filter>
    <filter id="markShadow" x="-40%" y="-40%" width="180%" height="180%"><feDropShadow dx="0" dy="9" stdDeviation="7" flood-color="#1d1d50" flood-opacity=".65"/></filter>
  </defs>
  <style>
    .coin{transform-box:fill-box;transform-origin:center;animation:spin 6.1s cubic-bezier(.45,.05,.55,.95) infinite}.glint{animation:glint 6.1s ease-in-out infinite}
    @keyframes spin{0%{transform:perspective(900px) rotateX(7deg) rotateY(0)}50%{transform:perspective(900px) rotateX(-5deg) rotateY(180deg)}100%{transform:perspective(900px) rotateX(7deg) rotateY(360deg)}}@keyframes glint{0%,100%{opacity:.75;transform:translateX(-12px)}50%{opacity:.14;transform:translateX(25px)}}@media(prefers-reduced-motion:reduce){.coin,.glint{animation:none}}
  </style>
  <g class="coin" filter="url(#shadow)">
    <ellipse cx="256" cy="268" rx="190" ry="190" fill="#24264e"/>
    <circle cx="256" cy="256" r="190" fill="url(#rim)"/>
    <circle cx="256" cy="256" r="176" fill="#565a9c"/>
    <circle cx="256" cy="256" r="165" fill="url(#face)" stroke="#ececff" stroke-width="3"/>
    <circle cx="256" cy="256" r="151" fill="none" stroke="#fff" stroke-opacity=".38" stroke-width="2"/>
    <g filter="url(#markShadow)">
      <path d="M256 118 170 258l86 51 86-51-86-140Z" fill="url(#ethTop)"/>
      <path d="m256 118-86 140 86-39V118Z" fill="#7772cc"/>
      <path d="m256 219-86 39 86 51v-90Z" fill="#4b478f"/>
      <path d="m256 326-86-51 86 119 86-119-86 51Z" fill="url(#ethSide)"/>
      <path d="m256 326 86-51-86 119v-68Z" fill="#37356f"/>
    </g>
    <ellipse class="glint" cx="207" cy="180" rx="101" ry="69" fill="url(#shine)" transform="rotate(-35 207 180)"/>
    <path d="M112 323c29 79 121 119 200 83" fill="none" stroke="#f3f2ff" stroke-opacity=".38" stroke-width="5" stroke-linecap="round"/>
  </g>
</svg>
